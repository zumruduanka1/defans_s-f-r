<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DEFANS PRO</title>

<style>
body{
background:linear-gradient(180deg,#020617,#020617);
color:white;
font-family:Arial;
margin:0;
}

.container{
max-width:1200px;
margin:auto;
padding:40px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
}

.logo{
font-weight:bold;
font-size:20px;
}

.badge{
background:#1e293b;
padding:6px 12px;
border-radius:20px;
font-size:12px;
}

.title{
text-align:center;
font-size:46px;
font-weight:800;
}

.subtitle{
text-align:center;
color:#94a3b8;
margin-bottom:40px;
}

.stats{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:40px;
}

.stat{
background:#0f172a;
padding:20px;
border-radius:12px;
text-align:center;
width:120px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:#0f172a;
padding:20px;
border-radius:16px;
}

textarea{
width:100%;
height:120px;
background:#020617;
color:white;
border:none;
border-radius:10px;
padding:10px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
background:linear-gradient(90deg,#6366f1,#9333ea);
border:none;
border-radius:10px;
color:white;
font-weight:bold;
}

.item{
padding:10px;
border-bottom:1px solid #1e293b;
display:flex;
justify-content:space-between;
}

.badge-risk{
background:#7c2d12;
padding:4px 10px;
border-radius:20px;
}

.badge-safe{
background:#065f46;
padding:4px 10px;
border-radius:20px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="logo">🛡️ DEFANS PRO</div>
<div class="badge">AI Powered</div>
</div>

<div class="title">DEFANS</div>
<div class="title" style="font-size:32px;">Dezenformasyon Analiz Sistemi</div>

<div class="subtitle">
Yalan haberleri ve sosyal medya manipülasyonlarını tespit eder
</div>

<div class="grid">

<div class="card">
<h3>Yeni Analiz</h3>

<textarea id="text" placeholder="URL veya metin gir..."></textarea>

<button onclick="analyze()">Analiz Başlat</button>

<h3 id="res"></h3>
</div>

<div class="card">
<h3>Son Analizler</h3>
<div id="feed"></div>
</div>

</div>

</div>

<script>

async function analyze(){
 let t=document.getElementById("text").value

 let r=await fetch("/api/analyze",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({text:t})
 })

 let d=await r.json()
 document.getElementById("res").innerText="Risk:%"+d.risk+" "+d.label
}

async function load(){
 let r=await fetch("/api/feed")
 let d=await r.json()

 let html=""

 d.forEach(x=>{
  let badge = x.risk>=50
   ? '<span class="badge-risk">Şüpheli</span>'
   : '<span class="badge-safe">Güvenli</span>'

  html+=`<div class="item">
            <div>${x.text}</div>
            <div>${badge}</div>
         </div>`
 })

 document.getElementById("feed").innerHTML=html
}

setInterval(load,4000)
load()

</script>

</body>
</html>
